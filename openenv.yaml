version: "1.0.0"
name: "sentinel-db"
description: "Autonomous FinTech database auditor for maintaining financial integrity."
entrypoint: "inference.py"

tasks:
  - id: "audit_easy"
    name: "Integrity Restoration"
    difficulty: "easy"
    description: "Fix a static corrupted financial database with negative balances, duplicate IDs, and invalid statuses."
    grader: "grader.py"

  - id: "audit_medium"
    name: "Duplicate Reconciliation"
    difficulty: "medium"
    description: "Fix a corrupted database while a slow chaos monkey drains balances and injects duplicates every 8 seconds."
    grader: "grader.py"

  - id: "audit_hard"
    name: "Chaos Resilience"
    difficulty: "hard"
    description: "Fix a corrupted database while a chaos monkey aggressively drains balances every 2 seconds."
    grader: "grader.py"

runtime:
  engine: "python-3.10"
  memory_limit: "8GB"
  cpu_limit: 2