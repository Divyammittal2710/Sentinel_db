spec_version: 1
version: "1.0.0"
name: "sentinel-db"
description: "Autonomous FinTech database auditor."
entrypoint: "inference.py"

tasks:
  - id: "audit_easy"
    name: "Integrity Restoration"
    difficulty: "easy"
    description: "Fix a static corrupted financial database."
    grader: "grader.py"
    
  - id: "audit_medium"
    name: "Duplicate Reconciliation"
    difficulty: "medium"
    description: "Fix a database with a slow chaos monkey."
    grader: "grader.py"
    
  - id: "audit_hard"
    name: "Chaos Resilience"
    difficulty: "hard"
    description: "Fix a database with an aggressive chaos monkey."
    grader: "grader.py"

runtime:
  engine: "python-3.10"
  memory_limit: "8GB"
  cpu_limit: 2